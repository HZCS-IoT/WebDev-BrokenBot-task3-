<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شات بوت صوتي - Cohere</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="chat-container">
    <header class="chat-header">
      <div class="bot-avatar">🤖</div>
      <div>
        <h1>المساعد الصوتي</h1>
        <p id="statusText">اضغط على الميكروفون وابدأ الحديث</p>
      </div>
    </header>

    <div id="chatLog" class="chat-log">
      <div class="message bot">
        <p>مرحبًا! اضغط على زر الميكروفون وتحدّث معي بصوتك 🎤</p>
      </div>
    </div>

    <div class="chat-input">
      <button id="micBtn" class="mic-btn" title="اضغط للتحدث">
        <span id="micIcon">🎤</span>
      </button>
      <p class="hint">يعمل بشكل أفضل على متصفح Chrome أو Edge</p>
    </div>
  </div>

  <script src="app.js?v=cohere2"></script>
</body>
</html>
